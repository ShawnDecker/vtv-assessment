<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Word | Value to Victory</title>
    <meta name="description" content="Daily spiritual encouragement from Running From Miracles by Shawn E. Decker">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --border: #27272a;
            --text: #fafafa; --muted: #a1a1aa; --accent: #D4A847;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Satoshi', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .daily-word-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .daily-word-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .daily-word-header .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .daily-word-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .daily-word-header .date {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .daily-word-header .day-badge {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            margin-top: 0.75rem;
        }

        .scripture-block {
            background: var(--card);
            border-left: 4px solid var(--accent);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border-radius: 0 8px 8px 0;
        }

        .scripture-block .verse {
            font-family: 'Crimson Text', Georgia, serif;
            font-size: 1.25rem;
            font-style: italic;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 0.75rem;
        }

        .scripture-block .reference {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 0.75rem;
            margin-top: 2rem;
        }

        .reflection-text {
            font-family: 'Crimson Text', Georgia, serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .prayer-text {
            font-family: 'Crimson Text', Georgia, serif;
            font-size: 1.05rem;
            font-style: italic;
            line-height: 1.8;
            color: var(--muted);
            padding: 1.25rem;
            background: rgba(212, 168, 71, 0.05);
            border: 1px solid rgba(212, 168, 71, 0.15);
            border-radius: 8px;
        }

        .action-step {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-top: 1.5rem;
        }

        .action-step .step-title {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .action-step p {
            color: var(--muted);
            line-height: 1.6;
        }

        .daily-word-footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .daily-word-footer p {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .daily-word-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .nav-days {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .nav-days a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-days a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .loading { text-align: center; padding: 3rem; color: var(--muted); }

        @media (max-width: 600px) {
            .daily-word-container { padding: 1.5rem 1rem; }
            .daily-word-header h1 { font-size: 1.4rem; }
            .scripture-block .verse { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<script src="/nav.js"></script>
    <div class="daily-word-container">
        <div class="daily-word-header">
            <p class="label">Daily Word</p>
            <h1 id="devotional-title">Loading...</h1>
            <p class="date" id="devotional-date"></p>
            <span class="day-badge" id="day-badge">Day 1 of 60</span>
        </div>

        <div class="scripture-block">
            <p class="verse" id="scripture-text">"..."</p>
            <p class="reference" id="scripture-ref"></p>
        </div>

        <p class="section-label">Reflection</p>
        <p class="reflection-text" id="reflection"></p>

        <p class="section-label">Prayer</p>
        <p class="prayer-text" id="prayer"></p>

        <div class="action-step">
            <p class="step-title">Today's Step</p>
            <p id="action-step"></p>
        </div>

        <div class="nav-days">
            <a href="#" id="prev-day">Previous Day</a>
            <a href="#" id="next-day">Next Day</a>
        </div>

        <div class="daily-word-footer">
            <p>From <strong>"Running From Miracles"</strong> by Shawn E. Decker</p>
            <p style="margin-top: 0.5rem;"><a href="https://shawnedecker.com/books.html">Get the Free Book</a></p>
        </div>
    </div>

    <script>
        let devotionals = [];
        let currentDay = 0;

        async function loadDevotionals() {
            try {
                const res = await fetch('/api/devotional-today');
                const data = await res.json();
                if (data.success) {
                    currentDay = data.cycle_day - 1;
                    // Load all devotionals from static file
                    const allRes = await fetch('/data/devotionals.json');
                    devotionals = await allRes.json();
                    renderDay(currentDay);
                }
            } catch (e) {
                // Fallback: load static file directly
                try {
                    const res = await fetch('/data/devotionals.json');
                    devotionals = await res.json();
                    // Calculate day from date
                    const start = new Date('2026-04-06');
                    const diff = Math.floor((new Date() - start) / 86400000);
                    currentDay = ((diff % 60) + 60) % 60;
                    renderDay(currentDay);
                } catch (err) {
                    document.getElementById('devotional-title').textContent = 'Coming Soon';
                }
            }
        }

        function renderDay(index) {
            const d = devotionals[index];
            if (!d) return;

            document.getElementById('devotional-title').textContent = d.chapter_title;
            document.getElementById('devotional-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('day-badge').textContent = `Day ${d.day_number} of 60`;
            document.getElementById('scripture-text').textContent = `"${d.scripture_text}"`;
            document.getElementById('scripture-ref').textContent = `— ${d.scripture_reference}`;
            document.getElementById('reflection').textContent = d.reflection;
            document.getElementById('prayer').textContent = d.prayer;
            document.getElementById('action-step').textContent = d.action_step;
        }

        document.getElementById('prev-day').addEventListener('click', (e) => {
            e.preventDefault();
            currentDay = (currentDay - 1 + 60) % 60;
            renderDay(currentDay);
        });

        document.getElementById('next-day').addEventListener('click', (e) => {
            e.preventDefault();
            currentDay = (currentDay + 1) % 60;
            renderDay(currentDay);
        });

        loadDevotionals();
    </script>
</body>
</html>
