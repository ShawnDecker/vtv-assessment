<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VTV Agent Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#e4e4e7; font-family:Arial,Helvetica,sans-serif; min-height:100vh; padding:0 0 60px; }
  a { color:#D4A847; text-decoration:none; }

  .header { text-align:center; padding:24px 16px 12px; border-bottom:1px solid #1a1a1a; }
  .header .brand { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#D4A847; }
  .header h1 { font-family:Georgia,serif; font-size:20px; font-style:italic; color:#fff; margin-top:4px; }

  .auth-screen { max-width:400px; margin:80px auto; padding:0 20px; text-align:center; }
  .auth-screen input { width:100%; padding:14px 16px; background:#18181b; border:1px solid #27272a; border-radius:8px; color:#e4e4e7; font-size:16px; margin-bottom:12px; outline:none; }
  .auth-screen input:focus { border-color:#D4A847; }
  .auth-screen button { width:100%; padding:14px; background:linear-gradient(135deg,#D4A847,#b8942e); color:#0a0a0a; font-size:15px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; }

  .container { max-width:800px; margin:0 auto; padding:16px; display:none; }
  .container.show { display:block; }

  .section-title { font-size:12px; font-weight:bold; color:#D4A847; letter-spacing:1.5px; text-transform:uppercase; margin:24px 0 10px; }

  .health-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:8px; }
  .health-card { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:14px; text-align:center; }
  .health-card .svc { font-size:11px; color:#71717a; text-transform:uppercase; letter-spacing:0.5px; }
  .health-card .dot { width:12px; height:12px; border-radius:50%; display:inline-block; margin:8px 0; }
  .dot.healthy { background:#22c55e; box-shadow:0 0 8px #22c55e44; }
  .dot.degraded { background:#eab308; box-shadow:0 0 8px #eab30844; }
  .dot.down { background:#ef4444; box-shadow:0 0 8px #ef444444; }
  .health-card .ms { font-size:13px; font-weight:bold; color:#e4e4e7; }

  .stat-row { display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:8px; margin-bottom:12px; }
  .stat-box { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:14px; text-align:center; }
  .stat-box .num { font-size:24px; font-weight:bold; color:#D4A847; }
  .stat-box .label { font-size:10px; color:#71717a; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

  .card { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:14px; margin-bottom:8px; }
  .card .name { font-size:13px; font-weight:bold; color:#e4e4e7; }
  .card .meta { font-size:11px; color:#71717a; margin-top:4px; }
  .card .detail { font-size:12px; color:#a1a1aa; margin-top:6px; line-height:1.5; }

  .badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:bold; text-transform:uppercase; }
  .b-green { background:#0a3b1a; color:#22c55e; }
  .b-yellow { background:#3b3506; color:#eab308; }
  .b-red { background:#3b1114; color:#ef4444; }
  .b-gold { background:#3b3006; color:#D4A847; }

  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { text-align:left; color:#71717a; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; padding:8px 6px; border-bottom:1px solid #27272a; }
  td { padding:8px 6px; border-bottom:1px solid #1f1f23; color:#e4e4e7; }

  .sys-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:8px; }
  .sys-card { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:12px; }
  .sys-card .sys-name { font-size:12px; font-weight:bold; color:#e4e4e7; display:flex; align-items:center; gap:6px; }
  .sys-card .sys-type { font-size:10px; color:#71717a; margin-top:2px; }
  .sys-card .sys-meta { font-size:11px; color:#a1a1aa; margin-top:6px; line-height:1.4; }
  .sys-card .sys-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
  .sys-dot.s-running { background:#22c55e; }
  .sys-dot.s-healthy { background:#22c55e; }
  .sys-dot.s-unhealthy { background:#eab308; }
  .sys-dot.s-restarting { background:#ef4444; animation:pulse 1.5s infinite; }
  .sys-dot.s-exited { background:#ef4444; }
  .sys-dot.s-stopped { background:#71717a; }
  .sys-dot.s-created { background:#71717a; }
  .sys-dot.s-unknown { background:#71717a; }
  .sys-dot.s-loaded { background:#22c55e; }
  .sys-dot.s-available { background:#3b82f6; }
  .sys-dot.s-active { background:#22c55e; }
  .sys-dot.s-degraded { background:#eab308; }
  .sys-dot.s-down { background:#ef4444; }
  .sys-dot.s-complete { background:#22c55e; }
  .sys-dot.s-issues { background:#eab308; }
  .sys-dot.s-pending { background:#3b82f6; animation:pulse 1.5s infinite; }
  .sys-dot.s-online { background:#22c55e; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  .cat-header { font-size:11px; color:#D4A847; font-weight:bold; letter-spacing:1px; text-transform:uppercase; margin:16px 0 8px; padding-bottom:4px; border-bottom:1px solid #27272a; }
  .download-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:8px; margin-bottom:16px; }
  .download-card { background:#18181b; border:1px solid #27272a; border-radius:10px; padding:16px; text-align:center; cursor:pointer; transition:border-color 0.2s; text-decoration:none; color:#e4e4e7; display:block; }
  .download-card:hover { border-color:#D4A847; }
  .download-card .dl-icon { font-size:28px; margin-bottom:8px; }
  .download-card .dl-name { font-size:13px; font-weight:bold; }
  .download-card .dl-desc { font-size:10px; color:#71717a; margin-top:4px; }
  .download-card .dl-size { font-size:9px; color:#D4A847; margin-top:6px; }
  .sys-summary { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
  .sys-summary .ss { font-size:12px; color:#a1a1aa; }
  .sys-summary .ss b { color:#e4e4e7; }

  .refresh-btn { position:fixed; bottom:16px; right:16px; padding:12px 20px; background:linear-gradient(135deg,#D4A847,#b8942e); color:#0a0a0a; font-size:13px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; z-index:100; }
  .quick-links { display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:8px; margin-bottom:16px; }
  .quick-link { display:flex; flex-direction:column; align-items:center; gap:4px; background:#18181b; border:1px solid #27272a; border-radius:10px; padding:14px 8px; text-decoration:none; color:#e4e4e7; transition:border-color 0.2s; }
  .quick-link:hover { border-color:#D4A847; }
  .quick-link .icon { font-size:22px; }
  .quick-link .ql-name { font-size:11px; font-weight:bold; text-transform:uppercase; letter-spacing:0.5px; }
  .quick-link .ql-sub { font-size:9px; color:#71717a; }

  .loading { text-align:center; padding:40px; color:#71717a; }
  .spinner { display:inline-block; width:20px; height:20px; border:3px solid #27272a; border-top-color:#D4A847; border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="brand">VALUE TO VICTORY</div>
  <h1>Team Hub</h1>
</div>

<!-- SIMPLE TEAM VIEW — no login needed -->
<div id="teamView" class="container show">
  <div class="section-title">Get Started</div>
  <div style="max-width:400px;margin:0 auto 16px;">
    <a class="download-card" href="/vtv-install.bat" download style="padding:24px;border:2px solid #D4A847;">
      <div class="dl-icon" style="font-size:36px;">&#128229;</div>
      <div class="dl-name" style="font-size:16px;">Download Installer</div>
      <div class="dl-desc" style="font-size:12px;margin-top:6px;">One file. Right-click, Run as Admin.<br>Installs VTV config + Claude-Mem memory.</div>
      <div class="dl-size" style="margin-top:8px;">vtv-install.bat</div>
    </a>
    <a class="download-card" href="/vtv-uninstall.bat" download style="margin-top:8px;border-color:#3f3f46;">
      <div class="dl-name" style="font-size:12px;color:#71717a;">Uninstall</div>
    </a>
  </div>

  <div class="section-title">Quick Links</div>
  <div class="quick-links">
    <a class="quick-link" href="https://assessment.valuetovictory.com" target="_blank"><span class="icon">&#128218;</span><span class="ql-name">Assessment</span><span class="ql-sub">Take yours</span></a>
    <a class="quick-link" href="https://valuetovictory.com" target="_blank"><span class="icon">&#127775;</span><span class="ql-name">VTV Home</span><span class="ql-sub">Main site</span></a>
    <a class="quick-link" href="https://calendly.com/valuetovictory/30min" target="_blank"><span class="icon">&#128197;</span><span class="ql-name">Book Call</span><span class="ql-sub">30 min</span></a>
  </div>

  <div style="text-align:center;margin-top:40px;">
    <a href="javascript:void(0)" onclick="showAdmin()" style="font-size:11px;color:#3f3f46;">Admin</a>
  </div>
</div>

<!-- ADMIN LOGIN — hidden by default -->
<div id="auth" class="auth-screen" style="display:none;">
  <p style="color:#71717a;font-size:13px;margin-bottom:20px;">Admin access</p>
  <input type="password" id="apiKey" placeholder="PIN or API Key" autocomplete="off"/>
  <button onclick="authenticate()">Go</button>
  <div id="authError" style="color:#ef4444;font-size:13px;margin-top:8px;display:none;"></div>
  <div style="margin-top:12px;"><a href="javascript:void(0)" onclick="hideAdmin()" style="font-size:11px;color:#52525b;">Back</a></div>
</div>

<!-- FULL ADMIN DASHBOARD — after login -->
<div id="dashboard" class="container">
  <div id="content"><div class="loading"><div class="spinner"></div><p style="margin-top:8px;">Loading agent data...</p></div></div>
</div>

<button class="refresh-btn" onclick="loadDashboard()" style="display:none" id="refreshBtn">Refresh</button>

<script>
let API_KEY = '';
const API = '/api/agent';

function showAdmin() {
  document.getElementById('teamView').style.display = 'none';
  document.getElementById('auth').style.display = 'block';
}
function hideAdmin() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('teamView').style.display = 'block';
}
function unlockDashboard() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('teamView').style.display = 'none';
  document.getElementById('dashboard').classList.add('show');
  document.getElementById('refreshBtn').style.display = 'block';
  try { localStorage.setItem('vtv_admin_key', API_KEY); } catch(e){}
  loadDashboard();
}

// Auto-login: URL param > localStorage
try {
  const urlKey = new URLSearchParams(window.location.search).get('key');
  if (urlKey) {
    API_KEY = urlKey.trim();
    setTimeout(() => unlockDashboard(), 0);
  } else {
    const saved = localStorage.getItem('vtv_admin_key');
    if (saved) {
      API_KEY = saved;
      setTimeout(() => unlockDashboard(), 0);
    }
  }
} catch(e) {}

function authenticate() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return;

  // Short input = try PIN login first
  const tryKey = key.length <= 20
    ? fetch('/api/admin/pin-login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pin:key}) })
        .then(r => { if (!r.ok) throw new Error('Invalid PIN'); return r.json(); })
        .then(d => d.apiKey)
    : Promise.resolve(key);

  tryKey.then(resolvedKey => {
    API_KEY = resolvedKey;
    unlockDashboard();
  }).catch(() => {
    API_KEY = key;
    unlockDashboard();
  });
}

document.getElementById('apiKey').addEventListener('keydown', e => { if (e.key === 'Enter') authenticate(); });

async function api(path) {
  const r = await fetch(`${API}${path}`, { headers: { 'x-api-key': API_KEY } });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

async function loadDashboard() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:8px;">Loading...</p></div>';

  try {
    const data = await api('/dashboard');
    render(data);
  } catch (err) {
    el.innerHTML = `<div class="card"><p style="color:#ef4444;">Failed to load: ${err.message}</p></div>`;
  }
}

function render(data) {
  const el = document.getElementById('content');
  let html = '';

  // === QUICK LINKS (Categorized) ===
  const linkGroups = [
    { title: 'Cloud Services', links: [
      { icon:'&#9650;', name:'Vercel', sub:'Deployments', url:'https://vercel.com/danddappraisal-7740s-projects' },
      { icon:'&#9881;', name:'n8n', sub:'Workflows', url:'https://n8n.srv1138119.hstgr.cloud' },
      { icon:'&#128179;', name:'Stripe', sub:'Payments', url:'https://dashboard.stripe.com' },
      { icon:'&#128100;', name:'HubSpot', sub:'CRM', url:'https://app.hubspot.com' },
      { icon:'&#128202;', name:'Neon', sub:'Database', url:'https://console.neon.tech' },
      { icon:'&#128187;', name:'GitHub', sub:'Repos', url:'https://github.com/ShawnDecker' },
      { icon:'&#127760;', name:'Hostinger', sub:'VPS', url:'https://hpanel.hostinger.com' },
      { icon:'&#128197;', name:'Calendly', sub:'Scheduling', url:'https://calendly.com/app/scheduled_events/upcoming' },
      { icon:'&#127968;', name:'GoDaddy', sub:'Domains', url:'https://dcc.godaddy.com' },
    ]},
    { title: 'VTV Sites & Portal', links: [
      { icon:'&#127775;', name:'VTV Home', sub:'Marketing', url:'https://valuetovictory.com' },
      { icon:'&#128218;', name:'VTV Portal', sub:'Assessment', url:'https://assessment.valuetovictory.com' },
      { icon:'&#128221;', name:'Admin', sub:'Contacts', url:'https://assessment.valuetovictory.com/admin/contacts' },
      { icon:'&#128150;', name:'Couples', sub:'Report', url:'https://assessment.valuetovictory.com/couple-report' },
      { icon:'&#129309;', name:'Relationships', sub:'Hub', url:'https://assessment.valuetovictory.com/relationship-hub' },
      { icon:'&#127912;', name:'Shawn Site', sub:'Author', url:'https://shawnedecker.com' },
    ]},
  ];
  for (const group of linkGroups) {
    html += `<div class="section-title">${group.title}</div>`;
    html += '<div class="quick-links">';
    for (const l of group.links) {
      html += `<a class="quick-link" href="${l.url}" target="_blank"><span class="icon">${l.icon}</span><span class="ql-name">${l.name}</span><span class="ql-sub">${l.sub}</span></a>`;
    }
    html += '</div>';
  }

  // === TEAM INSTALLATIONS (admin only) ===
  const teamSystems = (data.systems || []).filter(s => s.category === 'team');
  if (teamSystems.length) {
    html += '<div class="section-title">Team Installations</div>';
    const members = {};
    for (const s of teamSystems) {
      const memberName = s.system_name.split(':')[1] || 'unknown';
      if (!members[memberName]) members[memberName] = [];
      members[memberName].push(s);
    }
    html += '<div class="sys-grid">';
    for (const [name, systems] of Object.entries(members)) {
      const install = systems.find(s => s.system_type === 'installation');
      const machine = systems.find(s => s.system_type === 'resource');
      const ollama = systems.find(s => s.system_type === 'ollama');
      const meta = install?.metadata || {};
      const machineMeta = machine?.metadata || {};
      const status = install?.status || 'pending';
      const dotClass = 's-' + status;
      const steps = meta.steps || [];
      const passed = steps.filter(s => s.startsWith('pass:')).length;
      const failed = steps.filter(s => s.startsWith('fail:')).length;

      html += `<div class="sys-card">
        <div class="sys-name"><span class="sys-dot ${dotClass}"></span>${name.toUpperCase()}</div>
        <div class="sys-type">${machineMeta.hostname || 'Unknown machine'} &bull; ${machineMeta.os || ''}</div>
        <div class="sys-meta">
          <div>RAM: ${machineMeta.ram_gb || '?'}GB &bull; CPU: ${machineMeta.cpu_cores || '?'} cores</div>
          <div>Disk Free: ${machineMeta.disk_free_gb || '?'}GB</div>
          <div>Model Tier: ${meta.model_tier || '?'} (${(meta.models||[]).length} models)</div>
          <div>Steps: ${passed} passed${failed ? ', <span style="color:#ef4444">' + failed + ' failed</span>' : ''}</div>
        </div>
        <div style="font-size:9px;color:#52525b;margin-top:4px;">Installed ${timeAgo(meta.installed_at || install?.last_reported_at)}</div>
      </div>`;
    }
    html += '</div>';
  }

  // === SYSTEM HEALTH ===
  html += '<div class="section-title">System Health</div>';
  html += '<div class="health-grid">';
  for (const h of (data.health || [])) {
    const dot = h.status === 'healthy' ? 'healthy' : h.status === 'degraded' ? 'degraded' : 'down';
    const ms = h.response_time_ms !== null ? h.response_time_ms + 'ms' : '—';
    html += `<div class="health-card"><div class="svc">${h.service}</div><div class="dot ${dot}"></div><div class="ms">${ms}</div></div>`;
  }
  html += '</div>';

  // === AGENT STATUS ===
  html += '<div class="section-title">Agent Status</div>';
  for (const agent of (data.agents || [])) {
    const ago = timeAgo(agent.run_at);
    html += `<div class="card"><div class="name">${agent.agent_name.toUpperCase()} Agent</div>`;
    html += `<div class="meta">Last run: ${ago}</div>`;
    const actions = agent.actions_taken || {};
    html += `<div class="detail">${JSON.stringify(actions).substring(0, 200)}</div></div>`;
  }

  // === EMAIL PERFORMANCE ===
  html += '<div class="section-title">Email Performance (7 days)</div>';
  const es = data.email?.stats || {};
  html += '<div class="stat-row">';
  html += stat(es.total_sent || 0, 'Sent');
  html += stat(es.open_rate || 0, 'Open %');
  html += stat(es.click_rate || 0, 'Click %');
  html += stat(es.actions_done || 0, 'Actions');
  html += '</div>';

  // Persona distribution
  if (data.email?.personas?.length) {
    html += '<div class="stat-row">';
    for (const p of data.email.personas) {
      const badge = p.persona === 'fast_mover' ? 'b-green' : p.persona === 'disengaged' ? 'b-red' : p.persona === 'high_performer' ? 'b-gold' : 'b-yellow';
      html += `<div class="stat-box"><div class="num">${p.count}</div><div class="label"><span class="badge ${badge}">${p.persona}</span></div></div>`;
    }
    html += '</div>';
  }

  // === TOP PAGES ===
  html += '<div class="section-title">Top Pages</div>';
  if (data.pages?.length) {
    html += '<table><tr><th>Page</th><th>Views</th><th>Conv %</th></tr>';
    for (const p of data.pages) {
      html += `<tr><td>${p.page_path}</td><td>${p.views}</td><td>${(p.conversion_rate * 100).toFixed(1)}%</td></tr>`;
    }
    html += '</table>';
  } else {
    html += '<div class="card"><div class="detail">No page data yet. Run the Website Agent first.</div></div>';
  }

  // === RULE WEIGHTS ===
  html += '<div class="section-title">Learning Rules</div>';
  if (data.rules?.length) {
    html += '<table><tr><th>Agent</th><th>Rule</th><th>Weight</th><th>Fired</th><th>Success</th></tr>';
    for (const r of data.rules) {
      const successRate = r.times_fired > 0 ? Math.round(r.times_succeeded / r.times_fired * 100) : 0;
      html += `<tr><td>${r.agent_name}</td><td>${r.rule_key}</td><td style="color:#D4A847;font-weight:bold;">${r.weight.toFixed(2)}</td><td>${r.times_fired}</td><td>${successRate}%</td></tr>`;
    }
    html += '</table>';
  }

  // === RECENT DECISIONS ===
  html += '<div class="section-title">Recent Agent Decisions</div>';
  for (const d of (data.recentDecisions || []).slice(0, 5)) {
    const ago = timeAgo(d.run_at);
    const decisions = d.decisions;
    const preview = JSON.stringify(decisions).substring(0, 200);
    html += `<div class="card"><div class="name">${d.agent_name.toUpperCase()}</div><div class="meta">${ago}</div><div class="detail">${preview}</div></div>`;
  }

  // === INFRASTRUCTURE SYSTEMS ===
  const systems = data.systems || [];
  if (systems.length) {
    html += '<div class="section-title">Infrastructure Systems</div>';

    // Summary counts
    const running = systems.filter(s => ['running','healthy','active','loaded'].includes(s.status)).length;
    const degraded = systems.filter(s => ['unhealthy','degraded','restarting'].includes(s.status)).length;
    const down = systems.filter(s => ['exited','stopped','down','created'].includes(s.status)).length;
    html += '<div class="sys-summary">';
    html += `<div class="ss"><b style="color:#22c55e">${running}</b> Healthy</div>`;
    if (degraded) html += `<div class="ss"><b style="color:#eab308">${degraded}</b> Degraded</div>`;
    if (down) html += `<div class="ss"><b style="color:#ef4444">${down}</b> Down</div>`;
    html += `<div class="ss"><b>${systems.length}</b> Total</div>`;
    html += '</div>';

    // Group by category
    const cats = {};
    for (const s of systems) {
      const cat = s.category || 'other';
      if (!cats[cat]) cats[cat] = [];
      cats[cat].push(s);
    }

    const catLabels = { local: 'Local Services', cloud: 'Cloud Services', docker: 'Docker Containers', ollama: 'AI Models', infrastructure: 'Infrastructure' };

    for (const [cat, items] of Object.entries(cats)) {
      html += `<div class="cat-header">${catLabels[cat] || cat} (${items.length})</div>`;
      html += '<div class="sys-grid">';
      for (const s of items) {
        const dotClass = 's-' + (s.status || 'unknown').toLowerCase().replace(/[^a-z]/g,'');
        const meta = s.metadata || {};
        let details = '';

        // Docker containers
        if (s.system_type === 'docker') {
          if (meta.ports) details += `<div>Ports: ${meta.ports}</div>`;
          if (meta.image) details += `<div>Image: ${meta.image}</div>`;
          if (meta.uptime) details += `<div>${meta.uptime}</div>`;
        }
        // Ollama models
        else if (s.system_type === 'ollama') {
          if (meta.size) details += `<div>Size: ${meta.size}</div>`;
          if (meta.quantization) details += `<div>Quant: ${meta.quantization}</div>`;
          if (meta.parameters) details += `<div>Params: ${meta.parameters}</div>`;
        }
        // Cloud services
        else if (s.system_type === 'cloud') {
          if (meta.tier) details += `<div>Tier: ${meta.tier}</div>`;
          if (meta.response_ms) details += `<div>Response: ${meta.response_ms}ms</div>`;
        }
        // Generic
        else {
          const keys = Object.keys(meta).slice(0, 3);
          for (const k of keys) details += `<div>${k}: ${meta[k]}</div>`;
        }

        const endpoint = s.endpoint ? `<div style="font-size:10px;color:#71717a;margin-top:4px;word-break:break-all;">${s.endpoint}</div>` : '';
        const reported = s.last_reported_at ? `<div style="font-size:9px;color:#52525b;margin-top:4px;">Updated ${timeAgo(s.last_reported_at)}</div>` : '';

        html += `<div class="sys-card">
          <div class="sys-name"><span class="sys-dot ${dotClass}"></span>${s.system_name}</div>
          <div class="sys-type">${s.system_type}</div>
          ${details ? '<div class="sys-meta">' + details + '</div>' : ''}
          ${endpoint}${reported}
        </div>`;
      }
      html += '</div>';
    }
  }

  el.innerHTML = html;
}

function stat(val, label) {
  return `<div class="stat-box"><div class="num">${val}</div><div class="label">${label}</div></div>`;
}


function timeAgo(ts) {
  if (!ts) return 'Never';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}
