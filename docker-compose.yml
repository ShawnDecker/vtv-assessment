##############################################
# Value to Victory — Local Docker Stack
# Run: docker compose up -d
# Monitor: node scripts/system-agent.js --loop
##############################################

services:
  # ===== n8n Workflow Automation =====
  n8n:
    image: n8nio/n8n:latest
    container_name: vtv-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/New_York
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== Ollama Local AI =====
  ollama:
    image: ollama/ollama:latest
    container_name: vtv-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== Nginx Audiobook Server =====
  audiobook:
    image: nginx:alpine
    container_name: vtv-audiobook
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./audio:/usr/share/nginx/html/audio:ro
      - ./docker/nginx-audiobook.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== ComfyUI (AI Image/Video Generation) =====
  comfyui:
    image: comfyanonymous/comfyui:latest
    container_name: vtv-comfyui
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - comfyui_data:/comfyui/output
      - comfyui_models:/comfyui/models
    environment:
      - CLI_ARGS=--cpu
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8188/"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  n8n_data:
  ollama_data:
  comfyui_data:
  comfyui_models:
