<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  <title>Coaching History — The Value Engine</title>
  <meta name="robots" content="noindex, nofollow" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TT6PYLPP31"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-TT6PYLPP31');gtag('config','G-MJ1SXZJ399');</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Satoshi',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
    .container{max-width:600px;margin:0 auto;padding:2rem 1.5rem 4rem}
    .brand{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#D4A847;font-weight:700;margin-bottom:.5rem}
    h1{font-size:1.75rem;font-weight:700;margin-bottom:.25rem}
    .sub{color:#a1a1aa;margin-bottom:2rem;font-size:.95rem}
    .hidden{display:none !important}
    .card{background:#18181b;border:1px solid #27272a;border-radius:.75rem;padding:1.5rem;margin-bottom:1.25rem}
    .section-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#D4A847;font-weight:700;margin-bottom:.75rem}
    label{display:block;font-size:.875rem;font-weight:500;margin-bottom:.5rem;color:#d4d4d8}
    input[type="email"]{width:100%;padding:.75rem 1rem;background:#18181b;border:1px solid #27272a;border-radius:.5rem;color:#fff;font-size:1rem;font-family:inherit;outline:none}
    input:focus{border-color:#D4A847}
    .btn{width:100%;padding:.875rem;background:#D4A847;color:#0a0a0a;border:none;border-radius:.5rem;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .error{color:#ef4444;font-size:.875rem;margin-top:.5rem}
    .link{color:#3b82f6;text-decoration:none;font-size:.875rem;display:inline-block;margin-top:1rem}
    .session-item{display:flex;gap:1rem;padding:1rem;background:#0a0a0a;border:1px solid #27272a;border-radius:.625rem;margin-bottom:.75rem;align-items:flex-start}
    .session-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
    .icon-re{background:#292007;border:1px solid #D4A847}
    .icon-personal{background:#1e3a5f;border:1px solid #3b82f6}
    .icon-company{background:#14532d;border:1px solid #22c55e}
    .session-meta{flex:1;min-width:0}
    .session-track{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:.15rem}
    .track-re{color:#D4A847}.track-personal{color:#3b82f6}.track-company{color:#22c55e}
    .session-date{font-size:.75rem;color:#71717a}
    .session-status{font-size:.7rem;font-weight:600;padding:.15rem .5rem;border-radius:2rem;display:inline-block;margin-top:.25rem}
    .status-submitted{background:#1e3a5f;color:#93c5fd}
    .status-scheduled{background:#14532d;color:#86efac}
    .status-completed{background:#292007;color:#D4A847}
    .empty-state{text-align:center;padding:2rem}
    .empty-state p{color:#a1a1aa;font-size:.9rem;margin-bottom:1rem}
    .footer{text-align:center;padding:2rem 0;border-top:1px solid #27272a;font-size:.75rem;color:#71717a;margin-top:2rem}
    .footer a{color:#D4A847;text-decoration:none}
    @media(max-width:480px){.container{padding:1.5rem 1rem 3rem}h1{font-size:1.5rem}}
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">The Value Engine</div>
    <h1>Coaching History</h1>
    <p class="sub">Your past sessions and requests.</p>

    <div id="lookupView">
      <div style="margin-bottom:1.5rem">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter')loadHistory()" />
        <div id="emailError" class="error hidden"></div>
      </div>
      <button class="btn" onclick="loadHistory()">View History</button>
      <a href="/member" class="link">Back to Dashboard</a>
    </div>

    <div id="historyView" class="hidden">
      <div id="sessionList"></div>

      <div style="margin-top:1.5rem">
        <a href="/coaching" style="display:block;text-align:center;padding:.875rem;background:#D4A847;color:#0a0a0a;font-weight:700;border-radius:.5rem;text-decoration:none;font-size:.9rem">Book a New Session</a>
      </div>
      <a href="/member" class="link">Back to Dashboard</a>
    </div>

    <div class="footer">
      <div>"Don't guess. Run the tool."</div>
      <div style="margin-top:.5rem">&copy; 2026 <a href="https://valuetovictory.com">Value to Victory</a> &mdash; Shawn E. Decker</div>
    </div>
  </div>

  <script>
    try { var saved = localStorage.getItem('ve_email'); if (saved) document.getElementById('email').value = saved; } catch(e) {}

    async function loadHistory() {
      var email = document.getElementById('email').value.trim().toLowerCase();
      var errEl = document.getElementById('emailError');
      errEl.classList.add('hidden');
      if (!email || !email.includes('@')) { errEl.textContent = 'Enter a valid email.'; errEl.classList.remove('hidden'); return; }

      try {
        var resp = await fetch('/api/coaching/status?email=' + encodeURIComponent(email));
        var data = await resp.json();
        renderHistory(data.sessions || data.history || []);
        document.getElementById('lookupView').classList.add('hidden');
        document.getElementById('historyView').classList.remove('hidden');
      } catch(e) { errEl.textContent = 'Could not load history. Try again.'; errEl.classList.remove('hidden'); }
    }

    function renderHistory(sessions) {
      var el = document.getElementById('sessionList');
      if (!sessions || sessions.length === 0) {
        el.innerHTML = '<div class="empty-state"><div style="font-size:2rem;margin-bottom:.75rem">📋</div><p>No coaching sessions yet.</p><p style="font-size:.8rem;color:#71717a">Book your first session to get started.</p></div>';
        return;
      }

      el.innerHTML = sessions.map(function(s) {
        var track = (s.track || s.coaching_track || 'personal').toLowerCase();
        var iconClass = track === 'realestate' || track === 're' ? 'icon-re' : track === 'company' ? 'icon-company' : 'icon-personal';
        var trackClass = track === 'realestate' || track === 're' ? 'track-re' : track === 'company' ? 'track-company' : 'track-personal';
        var trackLabel = track === 'realestate' || track === 're' ? 'Real Estate' : track === 'company' ? 'Company' : 'Personal';
        var status = s.status || 'submitted';
        var statusClass = 'status-' + status;
        var date = s.created_at ? new Date(s.created_at).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'}) : '—';
        var icon = track === 'realestate' || track === 're' ? '🏠' : track === 'company' ? '🏢' : '🎯';

        return '<div class="session-item">' +
          '<div class="session-icon ' + iconClass + '">' + icon + '</div>' +
          '<div class="session-meta">' +
          '<div class="session-track ' + trackClass + '">' + trackLabel + ' Coaching</div>' +
          '<div class="session-date">' + date + '</div>' +
          '<div class="session-status ' + statusClass + '">' + status.charAt(0).toUpperCase() + status.slice(1) + '</div>' +
          '</div></div>';
      }).join('');
    }
  </script>
</body>
</html>
