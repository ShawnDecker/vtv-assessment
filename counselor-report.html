  <style>

    body { font-family: 'Satoshi', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; line-height: 1.6; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .report-header .subtitle { font-size: 0.8rem; color: #71717a; font-style: italic; margin-bottom: 1.5rem; }
    .client-info { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; text-align: left; max-width: 400px; margin: 0 auto; }
    .client-info .label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #71717a; font-weight: 600; }
    .client-info .value { font-size: 0.9rem; color: #d4d4d8; margin-bottom: 0.75rem; }

    .section { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; padding: 1.75rem; margin-bottom: 1.5rem; }
    .section-title { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #D4A847; margin-bottom: 1.25rem; font-weight: 700; }
    .section-number { display: inline-block; width: 24px; height: 24px; background: #D4A847; color: #0a0a0a; border-radius: 50%; text-align: center; line-height: 24px; font-size: 0.75rem; font-weight: 700; margin-right: 0.5rem; }

    /* Score summary */
    .score-summary { text-align: center; padding: 1.5rem 0; }
    .master-score-lg { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .score-range-text { font-size: 1rem; font-weight: 700; margin-top: 0.25rem; }
    .score-context { font-size: 0.8rem; color: #71717a; margin-top: 0.5rem; }

    .score-crisis { color: #ef4444; }
    .score-survival { color: #f97316; }
    .score-growth { color: #eab308; }
    .score-momentum { color: #22c55e; }
    .score-mastery { color: #D4A847; }

    /* Pillar bars */
    .pillar-bars { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.25rem; }
    .pillar-bar { display: flex; align-items: center; gap: 0.75rem; }
    .pillar-label { width: 80px; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
    .pillar-track { flex: 1; height: 24px; background: #27272a; border-radius: 0.375rem; overflow: hidden; }
    .pillar-fill { height: 100%; border-radius: 0.375rem; display: flex; align-items: center; justify-content: flex-end; padding-right: 0.5rem; }
    .pillar-fill span { font-size: 0.7rem; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

    .pillar-people { background: linear-gradient(90deg, #f472b6, #db2777); }
    .pillar-influence { background: linear-gradient(90deg, #2dd4bf, #0d9488); }
    .pillar-numbers { background: linear-gradient(90deg, #60a5fa, #2563eb); }
    .pillar-knowledge { background: linear-gradient(90deg, #a78bfa, #7c3aed); }

    .attention-group { margin-bottom: 1.25rem; }
    .attention-group:last-child { margin-bottom: 0; }
    .attention-group-header { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.5rem; padding-bottom: 0.375rem; border-bottom: 1px solid #27272a; }
    .attention-item { padding: 0.75rem; background: #0a0a0a; border-left: 3px solid #ef4444; border-radius: 0 0.375rem 0.375rem 0; margin-bottom: 0.5rem; }
    .attention-item .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
    .attention-item .item-name { font-weight: 700; font-size: 0.85rem; color: #d4d4d8; }
    .attention-item .item-score { font-size: 0.75rem; font-weight: 700; color: #ef4444; }
    .attention-item .item-flag { font-size: 0.8rem; color: #a1a1aa; font-style: italic; }

    /* Strengths */
    .strength-item { padding: 0.75rem; background: #0a0a0a; border-left: 3px solid #22c55e; border-radius: 0 0.375rem 0.375rem 0; margin-bottom: 0.5rem; }
    .strength-item .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
    .strength-item .item-name { font-weight: 700; font-size: 0.85rem; color: #d4d4d8; }
    .strength-item .item-score { font-size: 0.75rem; font-weight: 700; color: #22c55e; }
    .strength-item .item-flag { font-size: 0.8rem; color: #a1a1aa; font-style: italic; }

    /* Focus areas */
    .focus-item { padding: 1rem; background: #0a0a0a; border-left: 3px solid #f97316; border-radius: 0 0.375rem 0.375rem 0; margin-bottom: 0.75rem; }
    .focus-item h4 { font-size: 0.9rem; color: #f97316; margin-bottom: 0.375rem; }
    .focus-item p { font-size: 0.825rem; color: #a1a1aa; }

    /* Interventions */
    .intervention-item { padding: 0.75rem; background: #0a0a0a; border-radius: 0.375rem; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .intervention-item .int-source { font-size: 0.7rem; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700; margin-bottom: 0.25rem; }
    .int-ve { color: #D4A847; }
    .int-general { color: #71717a; }
    .intervention-item .int-text { color: #d4d4d8; }

    .disclaimer { background: #0a0a0a; border: 1px solid #27272a; border-radius: 0.5rem; padding: 1rem; margin-top: 1.5rem; }
    .disclaimer p { font-size: 0.75rem; color: #71717a; margin-bottom: 0.25rem; }
    .disclaimer p:last-child { margin-bottom: 0; }
    .disclaimer a { color: #3b82f6; text-decoration: none; }

    .report-footer { text-align: center; padding: 3rem 0 2rem; border-top: 1px solid #27272a; margin-top: 2rem; }
    .report-footer .tagline { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.125rem; color: #D4A847; margin-bottom: 1rem; }
    .report-footer .copy { color: #71717a; font-size: 0.8rem; }
    .report-footer a { color: #3b82f6; text-decoration: none; }

    @media print {
      body { background: #fff; color: #000; }
      .back-link { display: none; }
      .section { border-color: #ddd; }
      .attention-item, .strength-item, .focus-item, .intervention-item { background: #f9f9f9; }
    }
    @media (max-width: 520px) {
      .report { padding: 1.5rem 1rem 3rem; }
      .client-info { grid-template-columns: 1fr; }
    }

    (async function() {
      var path = window.location.pathname;
      var match = path.match(/\/counselor-report\/(\d+)/);
      if (!match) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='flex'; return; }
      var assessmentId = match[1];

      try {
        var resp = await fetch('/api/report/' + assessmentId);
        if (!resp.ok) throw new Error('not found');
        var data = await resp.json();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('report').style.display = 'block';
        renderCounselorReport(data, assessmentId);

        document.getElementById('loading').style.display = 'none';

    function renderCounselorReport(data, assessmentId) {
      var a = data.assessment;
      var rx = data.prescription || {};
      var pct = data.percentiles || {};
      var name = (data.contact.firstName || '') + ' ' + (data.contact.lastName || '');
      var d = new Date(a.completedAt);

      var html = '';
      html += '<a class="back-link" href="/premium/' + assessmentId + '">&larr; Back to Premium Reports</a>';

      // Header
      html += '<div class="report-header">';
      html += '<div class="brand">VALUE ENGINE</div>';
      html += '<div class="title">Client Assessment Summary</div>';
      html += '<div class="subtitle">Prepared for use by counselors, therapists, coaches, and mentors</div>';
      html += '<div class="client-info">';
      html += '<div><div class="label">Client Name</div><div class="value">' + name + '</div></div>';
      html += '<div><div class="label">Assessment Date</div><div class="value">' + d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) + '</div></div>';

      html += '</div></div>';

      // Section 1: Score Summary

      html += '<div class="section-title"><span class="section-number">1</span> Score Summary</div>';
      html += '<div class="score-summary">';
      html += '<div class="master-score-lg ' + (rangeColors[a.scoreRange] || '') + '">' + a.masterScore + '</div>';

      html += '<div class="score-context">Master Value Score: ' + a.masterScore + '/250 (Raw: ' + a.rawScore + ', Time Multiplier: ' + a.timeMultiplier + 'x)</div>';

        html += '<div class="score-context">Ranks higher than ' + pct.masterScore + '% of all assessment takers</div>';
      }
      html += '</div>';
      // Pillar bars
      html += '<div class="pillar-bars">';
      var pillars = [
        { name: 'Time', score: a.timeTotal },
        { name: 'People', score: a.peopleTotal },
        { name: 'Influence', score: a.influenceTotal },
        { name: 'Numbers', score: a.numbersTotal },
        { name: 'Knowledge', score: a.knowledgeTotal }
      ];
      pillars.forEach(function(p) {
        var pctWidth = Math.min(100, (p.score / 50) * 100);
        html += '<div class="pillar-bar"><div class="pillar-label" style="color:' + pillarColors[p.name] + '">' + p.name + '</div>';
        html += '<div class="pillar-track"><div class="pillar-fill ' + pillarClasses[p.name] + '" style="width:' + pctWidth + '%"><span>' + p.score + '/50</span></div></div></div>';
      });
      html += '</div></div>';

      // Section 2: Areas Requiring Attention (scores 1-2)
      html += '<div class="section">';
      html += '<div class="section-title"><span class="section-number">2</span> Areas Requiring Attention</div>';
      var hasAttention = false;
      ['Time','People','Influence','Numbers','Knowledge'].forEach(function(pillarName) {
        var subs = subCategoryMap[pillarName] || [];

          var val = a[sub[1]] || 0;
          if (val <= 2) lowSubs.push({ name: sub[0], score: val });
        });
        if (lowSubs.length > 0) {
          hasAttention = true;
          html += '<div class="attention-group">';
          html += '<div class="attention-group-header" style="color:' + pillarColors[pillarName] + '">' + pillarName + '</div>';

      });
      if (!hasAttention) {
        html += '<p style="color:#22c55e;font-size:0.9rem;">No sub-categories scored in the critical range (1-2). Client shows baseline competency across all areas.</p>';
      }
      html += '</div>';

      // Section 3: Strengths (scores 4-5)
      html += '<div class="section">';
      html += '<div class="section-title"><span class="section-number">3</span> Client Strengths</div>';
      var hasStrengths = false;
      ['Time','People','Influence','Numbers','Knowledge'].forEach(function(pillarName) {
        var subs = subCategoryMap[pillarName] || [];
        var highSubs = [];
        subs.forEach(function(sub) {
          var val = a[sub[1]] || 0;
          if (val >= 4) highSubs.push({ name: sub[0], score: val });
        });
        if (highSubs.length > 0) {
          hasStrengths = true;
          html += '<div class="attention-group">';
          html += '<div class="attention-group-header" style="color:' + pillarColors[pillarName] + '">' + pillarName + '</div>';
          highSubs.forEach(function(hs) {
            html += '<div class="strength-item">';
            html += '<div class="item-header"><span class="item-name">' + hs.name + '</span><span class="item-score">' + hs.score + '/5</span></div>';
            html += '<div class="item-flag">Client self-reported high functioning in this area.</div>';
            html += '</div>';
          });
          html += '</div>';
        }
      });
      if (!hasStrengths) {
        html += '<p style="color:#a1a1aa;font-size:0.9rem;">No sub-categories scored 4 or above. Focus on building from current levels.</p>';
      }
      html += '</div>';

      // Section 4: Recommended Focus Areas (top 3 lowest)
      html += '<div class="section">';
      html += '<div class="section-title"><span class="section-number">4</span> Recommended Focus Areas</div>';
      var allSubs = [];
      ['Time','People','Influence','Numbers','Knowledge'].forEach(function(pillarName) {
        var subs = subCategoryMap[pillarName] || [];
        subs.forEach(function(sub) {
          allSubs.push({ pillar: pillarName, name: sub[0], score: a[sub[1]] || 0 });
        });
      });
      allSubs.sort(function(x, y) { return x.score - y.score; });
      var focusAreas = allSubs.slice(0, 3);
      focusAreas.forEach(function(fa) {
        var desc = clinicalDescriptions[fa.name] || 'Client self-reported low functioning in this area.';
        html += '<div class="focus-item">';
        html += '<h4>' + fa.name + ' (' + fa.score + '/5) — ' + fa.pillar + ' Pillar</h4>';
        html += '<p>' + desc + '</p>';
        html += '</div>';
      });
      html += '</div>';

      // Section 5: Suggested Interventions
      html += '<div class="section">';
      html += '<div class="section-title"><span class="section-number">5</span> Suggested Interventions</div>';
      // Get interventions for the weakest 2 pillars
      var sortedPillars = [...pillars].sort(function(a, b) { return a.score - b.score; });
      var weakPillars = [sortedPillars[0].name];
      if (sortedPillars[1].score < 30) weakPillars.push(sortedPillars[1].name);

      weakPillars.forEach(function(pn) {
        var ints = interventionsByPillar[pn] || [];
        html += '<p style="font-weight:700;font-size:0.85rem;margin-bottom:0.75rem;color:' + pillarColors[pn] + '">' + pn + ' Pillar Interventions:</p>';
        ints.forEach(function(int) {
          var srcClass = int.source === 'Value Engine' ? 'int-ve' : 'int-general';
          html += '<div class="intervention-item">';
          html += '<div class="int-source ' + srcClass + '">' + int.source + '</div>';
          html += '<div class="int-text">' + int.text + '</div>';
          html += '</div>';
        });
      });
      html += '</div>';

      // Disclaimer / Footer
      html += '<div class="disclaimer">';
      html += '<p><strong>This report was generated by The Value Engine P.I.N.K. Assessment System</strong></p>';
      html += '<p>For the full framework, refer to "The Lost Art of Value: Time for P.I.N.K." by Shawn E. Decker</p>';
      html += '<p><a href="https://valuetovictory.com">valuetovictory.com</a></p>';
      html += '<p style="margin-top:0.75rem;"><strong>Disclaimer:</strong> This is a self-assessment tool and should not be used as a clinical diagnosis. Results reflect the client\'s self-reported perceptions at the time of assessment.</p>';
      html += '</div>';

      html += '<div class="report-footer">';
      html += '<div class="tagline">"Don\'t guess. Run the system."</div>';
      html += '<div class="copy">&copy; 2026 Value to Victory &mdash; Shawn E. Decker<br><a href="https://valuetovictory.com">valuetovictory.com</a></div>';
      html += '</div>';

      document.getElementById('report').innerHTML = html;
    }
  </script>
