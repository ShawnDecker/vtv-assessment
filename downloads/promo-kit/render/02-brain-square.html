<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card 02 · Brain · 1080×1080</title>
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
<link href="https://fonts.bunny.net/css?family=instrument-serif:400,400i|inter:400,500,700,800,900|jetbrains-mono:400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;font-family:'Inter',sans-serif}
  .card{
    width:1080px;height:1080px;position:relative;overflow:hidden;color:#fff;
    background:
      radial-gradient(ellipse 80% 70% at 50% 50%, rgba(34,211,238,0.18), transparent 60%),
      radial-gradient(ellipse 60% 50% at 20% 100%, rgba(167,139,250,0.18), transparent 60%),
      linear-gradient(180deg, #050a14 0%, #0a0f1c 50%, #050a14 100%);
    isolation:isolate;
  }
  .card::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity:0.1;mix-blend-mode:overlay;
  }
  .inner{position:relative;z-index:2;width:100%;height:100%;padding:80px;display:flex;flex-direction:column}
  .badge{
    align-self:flex-start;display:inline-flex;align-items:center;gap:10px;
    padding:10px 18px;border-radius:999px;
    background:rgba(34,211,238,0.1);backdrop-filter:blur(20px);
    border:1px solid rgba(34,211,238,0.3);
    font-size:13px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#67e8f9;
  }
  .badge::before{content:'';width:8px;height:8px;border-radius:50%;background:#22d3ee;box-shadow:0 0 16px #22d3ee}
  .graph{flex:1;position:relative;display:flex;align-items:center;justify-content:center}
  .graph svg{width:680px;height:680px;filter:drop-shadow(0 20px 60px rgba(34,211,238,0.3))}
  .node-core{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fde68a, #D4A847 40%, #92400e);
    box-shadow:
      0 0 0 6px rgba(255,255,255,0.08),
      0 0 0 1px rgba(255,255,255,0.3) inset,
      0 16px 40px rgba(212,168,71,0.6),
      0 0 80px rgba(212,168,71,0.4);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:900;color:#1a0f00;letter-spacing:0.04em;
  }
  .pulse{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:120px;height:120px;border-radius:50%;
    border:2px solid rgba(212,168,71,0.4);
    animation:pulse 2.4s ease-out infinite;
  }
  .pulse.p2{animation-delay:1.2s}
  @keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);opacity:0.7}
    100%{transform:translate(-50%,-50%) scale(2.6);opacity:0}
  }
  .headline{text-align:center;margin-top:40px}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(255,255,255,0.55);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:18px}
  .h1{
    font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;
    font-size:80px;line-height:1.0;letter-spacing:-0.01em;
  }
  .h1 .glow{
    background:linear-gradient(135deg,#67e8f9 0%,#22d3ee 50%,#0891b2 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 24px rgba(34,211,238,0.5));
    font-weight:700;font-style:normal;
  }
  .footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:36px;padding-top:28px;border-top:1px solid rgba(255,255,255,0.08)}
  .price{font-family:'Inter';font-weight:900;font-size:42px;color:#D4A847;letter-spacing:-0.02em}
  .url{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(255,255,255,0.5)}
</style>
</head>
<body>
<div class="card">
  <div class="inner">
    <div class="badge">Inspired by Iron Man · Built for your business</div>
    <div class="graph">
      <svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="nodeBlue" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#67e8f9"/>
            <stop offset="1" stop-color="#0891b2"/>
          </radialGradient>
          <radialGradient id="nodePurple" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#c4b5fd"/>
            <stop offset="1" stop-color="#7c3aed"/>
          </radialGradient>
          <radialGradient id="nodeGreen" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#86efac"/>
            <stop offset="1" stop-color="#16a34a"/>
          </radialGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <!-- edges -->
        <g stroke="rgba(34,211,238,0.4)" stroke-width="1.5" fill="none">
          <line x1="340" y1="340" x2="160" y2="200"/>
          <line x1="340" y1="340" x2="520" y2="200"/>
          <line x1="340" y1="340" x2="160" y2="480"/>
          <line x1="340" y1="340" x2="520" y2="480"/>
          <line x1="340" y1="340" x2="340" y2="120"/>
          <line x1="340" y1="340" x2="340" y2="560"/>
          <line x1="340" y1="340" x2="100" y2="340"/>
          <line x1="340" y1="340" x2="580" y2="340"/>
          <line x1="160" y1="200" x2="340" y2="120"/>
          <line x1="520" y1="200" x2="340" y2="120"/>
          <line x1="160" y1="480" x2="340" y2="560"/>
          <line x1="520" y1="480" x2="340" y2="560"/>
          <line x1="100" y1="340" x2="160" y2="200"/>
          <line x1="100" y1="340" x2="160" y2="480"/>
          <line x1="580" y1="340" x2="520" y2="200"/>
          <line x1="580" y1="340" x2="520" y2="480"/>
          <line x1="160" y1="200" x2="340" y2="340" stroke="rgba(212,168,71,0.7)" stroke-width="2"/>
        </g>
        <g filter="url(#glow)">
          <circle cx="160" cy="200" r="22" fill="url(#nodeBlue)"/>
          <circle cx="520" cy="200" r="22" fill="url(#nodeBlue)"/>
          <circle cx="160" cy="480" r="22" fill="url(#nodeBlue)"/>
          <circle cx="520" cy="480" r="22" fill="url(#nodeBlue)"/>
          <circle cx="340" cy="120" r="18" fill="url(#nodePurple)"/>
          <circle cx="340" cy="560" r="18" fill="url(#nodePurple)"/>
          <circle cx="100" cy="340" r="18" fill="url(#nodeGreen)"/>
          <circle cx="580" cy="340" r="18" fill="url(#nodeGreen)"/>
        </g>
      </svg>
      <div class="pulse"></div>
      <div class="pulse p2"></div>
      <div class="node-core">YOU</div>
    </div>
    <div class="headline">
      <div class="eyebrow">Your second brain · on your machine</div>
      <div class="h1">Your knowledge, <span class="glow">finally</span></div>
      <div class="h1"><span class="glow">connected.</span></div>
    </div>
    <div class="footer-row">
      <div class="price">$197</div>
      <div class="url">assessment.valuetovictory.com/professionals</div>
    </div>
  </div>
</div>
</body>
</html>
