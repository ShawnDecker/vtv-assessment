<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{personalized_subject}}</title>
</head>
<body style="margin:0;padding:0;background:#F6F0E6;font-family:Georgia,'Times New Roman',serif;color:#141414;line-height:1.65">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F6F0E6;padding:32px 16px">
  <tr><td>
    <table role="presentation" width="560" align="center" cellpadding="0" cellspacing="0" border="0" style="background:#FFFBF4;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(30,42,68,.08)">

      <!-- INTENTIONALLY MINIMAL — past-client emails should feel personal, not designed -->

      <tr><td style="padding:36px 40px 8px 40px">
        <p style="font-size:17px;color:#141414;margin:0 0 20px 0">Hi {{first_name}},</p>

        <p style="font-size:17px;color:#141414;margin:0 0 20px 0">
          {{specific_personal_reference}}
        </p>

        <p style="font-size:17px;color:#141414;margin:0 0 20px 0">
          {{relevant_local_or_market_note}}
        </p>

        <p style="font-size:17px;color:#141414;margin:0 0 24px 0">
          Hope all is well at the {{neighborhood}} house. {{family_member_callback}}
        </p>

        <p style="font-size:17px;color:#141414;margin:0 0 8px 0">
          &mdash; Nikki
        </p>
      </td></tr>

      <!-- Minimal sign-off — past clients don't need the marketing footer -->
      <tr><td style="padding:8px 40px 32px 40px;border-top:1px solid #E8DFCC;margin-top:24px">
        <div style="padding-top:16px;font-family:Georgia,serif;font-size:13px;color:#7A6E5E;font-style:italic;letter-spacing:.04em">
          Nikki Gergacs &middot; (912) 378-3427 &middot; nikki@gergacsrealty.com
        </div>
      </td></tr>

    </table>
  </td></tr>
</table>

<!-- ⚠️ USE-NOTES FOR THIS TEMPLATE ⚠️
This template is intentionally minimal. Past-client emails should NOT feel templated.

EVERY field {{...}} must be replaced manually with something specific. If you can't fill in the field with a real, specific detail you remember about this client, DO NOT SEND.

EXAMPLE POPULATED:

Subject: That photo of Lily's recital

Hi Maggie,

Saw the photo on Facebook this morning — congratulations to Lily on the recital. Hard to believe she was tearing through your kitchen pantry the day you closed.

Speaking of Ardsley Park — they finally repaved 50th near the school. Took them long enough.

Hope all is well at the Ardsley house. Tell Tom I said hi.

— Nikki

KEY RULES:
- One specific reference (their kid, a memory, a recent post they made)
- One sentence of "what's new" — only if it's relevant to them
- NO ask. NO CTA. The relationship is the deliverable.
- 60-100 words total
- Sent from Outlook, NOT a marketing platform
- NEVER cc: anyone. Always personal 1:1.

VOICE: Refer to gergacs-followup-composer skill, stage = "Past Client (any)".
-->
</body>
</html>
