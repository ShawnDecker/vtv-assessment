<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/auth.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=instrument-serif@400,400-italic&display=swap" rel="stylesheet">
  <title>The Value Engine — Cherish & Honor Matrix</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TT6PYLPP31"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-TT6PYLPP31');gtag('config','G-MJ1SXZJ399');</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Satoshi',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
    .container{max-width:560px;margin:0 auto;padding:2rem 1.5rem 4rem}
    .brand{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#D4A847;font-weight:700;margin-bottom:.5rem}
    h1{font-size:1.75rem;font-weight:700;margin-bottom:.25rem}
    .subtitle{color:#a1a1aa;margin-bottom:2rem;font-size:.95rem}
    .hidden{display:none !important}
    .loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#a1a1aa;font-size:1.125rem}
    .error{color:#ef4444;font-size:.875rem;margin-top:.5rem}
    .btn{width:100%;padding:.875rem;background:#3b82f6;color:#fff;border:none;border-radius:.5rem;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-gold{background:#D4A847;color:#0a0a0a}
    .btn-outline{background:transparent;border:1px solid #3b82f6;color:#3b82f6;padding:.875rem;border-radius:.5rem;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;width:100%;text-align:center;text-decoration:none;display:block}
    .card{background:#18181b;border:1px solid #27272a;border-radius:.75rem;padding:1.5rem;margin-bottom:1.25rem}
    .section-title{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#D4A847;font-weight:700;margin-bottom:.75rem}
    .progress-bar{display:flex;gap:.5rem;margin-bottom:2rem}
    .progress-segment{flex:1;height:4px;background:#27272a;border-radius:2px}
    .progress-segment.active{background:#D4A847}
    .progress-segment.done{background:#22c55e}
    .step-counter{font-size:.8rem;color:#71717a;margin-bottom:.75rem}
    .domain-title{font-family:'Instrument Serif',serif;font-size:1.25rem;font-style:italic;color:#d4d4d8;margin-bottom:1rem}
    .domain-question{font-size:.95rem;color:#d4d4d8;margin-bottom:1.5rem;line-height:1.5}
    .slider-group{margin-bottom:1.25rem}
    .slider-label{display:flex;justify-content:space-between;margin-bottom:.25rem;font-size:.8rem}
    .slider-value{font-weight:700;font-size:1rem}
    input[type="range"]{width:100%;accent-color:#D4A847;margin:.5rem 0}
    .slider-scale{display:flex;justify-content:space-between;font-size:.65rem;color:#71717a}
    .result-card{text-align:center;padding:2rem 1.5rem}
    .result-score{font-size:3rem;font-weight:900;color:#D4A847}
    .result-label{font-size:.75rem;color:#71717a;text-transform:uppercase;letter-spacing:.1em;margin-top:.25rem}
    .bar-row{margin-bottom:.75rem}
    .bar-label{display:flex;justify-content:space-between;font-size:.8rem;color:#a1a1aa;margin-bottom:.25rem}
    .bar-track{height:8px;background:#27272a;border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
    .fill-cherish{background:linear-gradient(90deg,#ec4899,#db2777)}
    .fill-honor{background:linear-gradient(90deg,#D4A847,#b8942e)}
    .footer{text-align:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid #27272a;font-size:.75rem;color:#71717a}
    @media(max-width:480px){.container{padding:1.5rem 1rem 3rem}h1{font-size:1.5rem}}
  </style>
</head>
<body>
<script src="/nav.js"></script>
  <div class="loading" id="loadingView">Loading...</div>

  <div class="container hidden" id="mainView">
    <div class="brand">THE VALUE ENGINE</div>
    <h1>Cherish & Honor Matrix</h1>
    <p class="subtitle">Separate love from respect. 10 questions, two dimensions.</p>

    <div id="assessmentView">
      <div class="progress-bar" id="progressBar">
        <div class="progress-segment active"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
      </div>
      <div id="questionContainer"></div>
      <div style="display:flex;gap:.75rem;margin-top:1.5rem">
        <button class="btn-outline" id="prevBtn" onclick="prev()" style="display:none">Back</button>
        <button class="btn btn-gold" id="nextBtn" onclick="next()">Next</button>
      </div>
      <div id="assessError" class="error hidden"></div>
    </div>

    <div id="resultsView" class="hidden">
      <div class="card result-card">
        <div style="display:flex;justify-content:center;gap:2rem;margin-bottom:1.5rem">
          <div>
            <div class="result-score" id="cherishScore" style="color:#ec4899">—</div>
            <div class="result-label">Cherish</div>
            <div style="font-size:.7rem;color:#71717a;margin-top:.25rem">How loved you feel</div>
          </div>
          <div>
            <div class="result-score" id="honorScore" style="color:#D4A847">—</div>
            <div class="result-label">Honor</div>
            <div style="font-size:.7rem;color:#71717a;margin-top:.25rem">How respected you feel</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Breakdown</div>
        <div id="resultBars"></div>
      </div>

      <div class="card" id="insightCard">
        <div class="section-title">What This Means</div>
        <p id="insightText" style="color:#d4d4d8;font-size:.9rem;line-height:1.6"></p>
      </div>

      <a href="/relationship-hub" class="btn-outline" style="margin-top:1rem">Back to Hub</a>
    </div>

    <div class="footer">Value to Victory &mdash; Shawn E. Decker</div>
  </div>

  <script>
    var profile = null;
    var current = 0;
    var scores = {};

    // 10 questions: 5 cherish (love) + 5 honor (respect), each with give/receive
    var QUESTIONS = [
      { key:'cherish', dim:'Cherish', q:1,
        topic:'Verbal Tenderness',
        give:'How often do you speak to your partner with warmth, gentleness, and affection?',
        receive:'How often does your partner speak to you with warmth, gentleness, and affection?' },
      { key:'cherish', dim:'Cherish', q:2,
        topic:'Emotional Safety',
        give:'How safe do you make it for your partner to be vulnerable with you?',
        receive:'How safe does your partner make it for you to be vulnerable?' },
      { key:'cherish', dim:'Cherish', q:3,
        topic:'Physical Affection',
        give:'How often do you initiate non-sexual physical closeness (hugs, hand-holding, touch)?',
        receive:'How often does your partner initiate non-sexual physical closeness with you?' },
      { key:'cherish', dim:'Cherish', q:4,
        topic:'Prioritization',
        give:'How often do you make your partner feel like they are your first priority?',
        receive:'How often does your partner make you feel like you are their first priority?' },
      { key:'cherish', dim:'Cherish', q:5,
        topic:'Delight',
        give:'How often do you show genuine delight — not just tolerance — in who your partner is?',
        receive:'How often does your partner show genuine delight in who you are?' },
      { key:'honor', dim:'Honor', q:1,
        topic:'Public Respect',
        give:'How do you speak about your partner when they are not in the room?',
        receive:'How does your partner speak about you when you are not in the room?' },
      { key:'honor', dim:'Honor', q:2,
        topic:'Decision Respect',
        give:'How often do you genuinely consider your partner\'s opinion before making decisions?',
        receive:'How often does your partner genuinely consider your opinion before making decisions?' },
      { key:'honor', dim:'Honor', q:3,
        topic:'Boundary Respect',
        give:'How well do you honor your partner\'s boundaries, preferences, and limits?',
        receive:'How well does your partner honor your boundaries, preferences, and limits?' },
      { key:'honor', dim:'Honor', q:4,
        topic:'Value Recognition',
        give:'How often do you acknowledge what your partner brings to the table — their strengths, sacrifices, and contributions?',
        receive:'How often does your partner acknowledge what you bring to the table?' },
      { key:'honor', dim:'Honor', q:5,
        topic:'Conflict Dignity',
        give:'During disagreements, how well do you maintain dignity and respect toward your partner?',
        receive:'During disagreements, how well does your partner maintain dignity and respect toward you?' }
    ];

    async function init() {
      var email = '';
      try { email = localStorage.getItem('ve_email') || ''; } catch(e) {}
      if (!email) { window.location.href = '/onboarding'; return; }

      try {
        var resp = await fetch('/api/r/profile?email=' + encodeURIComponent(email));
        if (!resp.ok) { window.location.href = '/onboarding'; return; }
        var data = await resp.json();
        profile = data.profile;
        if (!profile.contact_id) { window.location.href = '/onboarding'; return; }

        QUESTIONS.forEach(function(q, i) {
          scores['give_' + i] = 5;
          scores['receive_' + i] = 5;
        });

        renderQuestion(0);
        document.getElementById('loadingView').classList.add('hidden');
        document.getElementById('mainView').classList.remove('hidden');
      } catch(e) {
        window.location.href = '/onboarding';
      }
    }

    function renderQuestion(idx) {
      var q = QUESTIONS[idx];
      var dimColor = q.key === 'cherish' ? '#ec4899' : '#D4A847';

      var html = '<div class="step-counter">Question ' + (idx + 1) + ' of 10</div>';
      html += '<div class="domain-title">' + q.topic + '</div>';

      html += '<div class="slider-group">';
      html += '<div class="slider-label"><span style="color:' + dimColor + ';font-weight:700">What I Give</span><span class="slider-value" id="giveVal" style="color:' + dimColor + '">' + scores['give_' + idx] + '</span></div>';
      html += '<input type="range" min="0" max="10" step="1" value="' + scores['give_' + idx] + '" id="giveSlider" oninput="updateSlider(\'give\')" style="accent-color:' + dimColor + '" />';
      html += '<div style="font-size:.85rem;color:#d4d4d8;margin-bottom:.75rem;line-height:1.4">' + q.give + '</div>';
      html += '</div>';

      html += '<div class="slider-group">';
      html += '<div class="slider-label"><span style="color:#3b82f6;font-weight:700">What I Receive</span><span class="slider-value" id="receiveVal" style="color:#3b82f6">' + scores['receive_' + idx] + '</span></div>';
      html += '<input type="range" min="0" max="10" step="1" value="' + scores['receive_' + idx] + '" id="receiveSlider" oninput="updateSlider(\'receive\')" style="accent-color:#3b82f6" />';
      html += '<div style="font-size:.85rem;color:#d4d4d8;margin-bottom:.75rem;line-height:1.4">' + q.receive + '</div>';
      html += '</div>';

      document.getElementById('questionContainer').innerHTML = html;

      var segments = document.querySelectorAll('.progress-segment');
      var segIdx = Math.floor(idx / 2);
      segments.forEach(function(seg, i) {
        seg.className = 'progress-segment';
        if (i < segIdx) seg.classList.add('done');
        if (i === segIdx) seg.classList.add('active');
      });

      document.getElementById('prevBtn').style.display = idx === 0 ? 'none' : 'block';
      document.getElementById('nextBtn').textContent = idx === QUESTIONS.length - 1 ? 'See Results' : 'Next';
    }

    function updateSlider(type) {
      var slider = document.getElementById(type + 'Slider');
      var valEl = document.getElementById(type + 'Val');
      valEl.textContent = slider.value;
      scores[type + '_' + current] = parseInt(slider.value);
    }

    function next() {
      document.getElementById('assessError').classList.add('hidden');
      if (current < QUESTIONS.length - 1) {
        current++;
        renderQuestion(current);
      } else {
        showResults();
      }
    }

    function prev() {
      if (current > 0) {
        current--;
        renderQuestion(current);
      }
    }

    function showResults() {
      var cherishGive = 0, cherishReceive = 0, honorGive = 0, honorReceive = 0;
      var cherishCount = 0, honorCount = 0;

      QUESTIONS.forEach(function(q, i) {
        var g = scores['give_' + i] || 5;
        var r = scores['receive_' + i] || 5;
        if (q.key === 'cherish') {
          cherishGive += g; cherishReceive += r; cherishCount++;
        } else {
          honorGive += g; honorReceive += r; honorCount++;
        }
      });

      var cAvg = Math.round((cherishGive + cherishReceive) / (cherishCount * 2) * 10);
      var hAvg = Math.round((honorGive + honorReceive) / (honorCount * 2) * 10);

      document.getElementById('cherishScore').textContent = cAvg;
      document.getElementById('honorScore').textContent = hAvg;

      // Bars
      var bars = '';
      var topics = [
        { name:'Verbal Tenderness', g:scores.give_0, r:scores.receive_0, dim:'cherish' },
        { name:'Emotional Safety', g:scores.give_1, r:scores.receive_1, dim:'cherish' },
        { name:'Physical Affection', g:scores.give_2, r:scores.receive_2, dim:'cherish' },
        { name:'Prioritization', g:scores.give_3, r:scores.receive_3, dim:'cherish' },
        { name:'Delight', g:scores.give_4, r:scores.receive_4, dim:'cherish' },
        { name:'Public Respect', g:scores.give_5, r:scores.receive_5, dim:'honor' },
        { name:'Decision Respect', g:scores.give_6, r:scores.receive_6, dim:'honor' },
        { name:'Boundary Respect', g:scores.give_7, r:scores.receive_7, dim:'honor' },
        { name:'Value Recognition', g:scores.give_8, r:scores.receive_8, dim:'honor' },
        { name:'Conflict Dignity', g:scores.give_9, r:scores.receive_9, dim:'honor' }
      ];

      topics.forEach(function(t) {
        var fillClass = t.dim === 'cherish' ? 'fill-cherish' : 'fill-honor';
        var avg = Math.round((t.g + t.r) / 2) * 10;
        bars += '<div class="bar-row"><div class="bar-label"><span>' + t.name + '</span><span>' + Math.round((t.g + t.r) / 2) + '</span></div>';
        bars += '<div class="bar-track"><div class="bar-fill ' + fillClass + '" style="width:' + avg + '%"></div></div></div>';
      });
      document.getElementById('resultBars').innerHTML = bars;

      // Insight
      var insight = '';
      if (cAvg >= 7 && hAvg >= 7) {
        insight = 'Your relationship reflects both deep love and genuine respect. This is the foundation. Keep investing — what you have is rare and worth protecting.';
      } else if (cAvg >= 7 && hAvg < 5) {
        insight = 'There is love here, but respect may be lagging. Love without honor can become possessive or one-sided. Focus on how decisions are made, how you speak about each other publicly, and whether boundaries are honored.';
      } else if (cAvg < 5 && hAvg >= 7) {
        insight = 'There is respect, but emotional warmth may be missing. Honor without cherishing can feel cold or transactional. Focus on tenderness, physical closeness, and showing delight in who your partner is — not just what they do.';
      } else if (cAvg < 5 && hAvg < 5) {
        insight = 'Both dimensions need attention. This does not mean the relationship is broken — it means there is significant room for intentional growth. Start with one area in each dimension and commit to it for 30 days.';
      } else {
        insight = 'You are in the middle ground — some areas strong, some developing. Look at the breakdown above and identify the one Cherish topic and one Honor topic with the biggest give/receive gap. That gap is where your next conversation needs to happen.';
      }
      document.getElementById('insightText').textContent = insight;

      document.getElementById('assessmentView').classList.add('hidden');
      document.getElementById('resultsView').classList.remove('hidden');
    }

    init();
  </script>
</body>
</html>
