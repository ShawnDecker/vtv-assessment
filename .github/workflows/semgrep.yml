name: Semgrep (SAST)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/jwt \
            --config=p/secrets \
            --severity=ERROR \
            --severity=WARNING \
            --metrics=off
        continue-on-error: true
