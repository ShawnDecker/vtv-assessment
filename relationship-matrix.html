<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=instrument-serif@400,400-italic&display=swap" rel="stylesheet">
  <title>The Value Engine — Relationship Contribution Matrix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Satoshi', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
    .container { max-width: 560px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .brand { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: #D4A847; margin-bottom: 0.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
    .subtitle { color: #a1a1aa; margin-bottom: 2rem; font-size: 0.95rem; }
    .hidden { display: none !important; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #a1a1aa; font-size: 1.125rem; }
    .error { color: #ef4444; font-size: 0.875rem; margin-top: 0.5rem; }
    .btn { width: 100%; padding: 0.875rem; background: #3b82f6; color: #fff; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-gold { background: #D4A847; }
    .btn-gold:hover { background: #b8942e; }
    .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; padding: 0.875rem; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%; text-align: center; text-decoration: none; display: block; transition: all 0.2s; }
    .btn-outline:hover { background: #3b82f6; color: #fff; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .section-title { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #D4A847; margin-bottom: 1rem; font-weight: 700; }
    .link { color: #3b82f6; text-decoration: none; font-size: 0.875rem; display: inline-block; margin-top: 1rem; }
    .link:hover { text-decoration: underline; }

    /* Progress bar */
    .progress-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
    .progress-segment { flex: 1; height: 4px; background: #27272a; border-radius: 2px; transition: background 0.3s; }
    .progress-segment.active { background: #3b82f6; }
    .progress-segment.done { background: #D4A847; }
    .step-counter { font-size: 0.8rem; color: #71717a; margin-bottom: 0.75rem; }

    /* Domain card */
    .domain-title { font-family: 'Instrument Serif', serif; font-size: 1.25rem; font-style: italic; color: #d4d4d8; margin-bottom: 0.75rem; }
    .domain-question { font-size: 0.95rem; color: #d4d4d8; margin-bottom: 1.5rem; line-height: 1.6; }

    /* Sliders */
    .slider-group { margin-bottom: 1.5rem; }
    .slider-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .slider-label-text { font-size: 0.875rem; font-weight: 600; color: #d4d4d8; }
    .slider-value { font-size: 1.25rem; font-weight: 900; color: #3b82f6; min-width: 2rem; text-align: right; }
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 8px; background: #27272a; border-radius: 4px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 2px solid #0a0a0a; }
    input[type="range"]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 2px solid #0a0a0a; }
    .slider-scale { display: flex; justify-content: space-between; font-size: 0.7rem; color: #71717a; margin-top: 0.25rem; }

    /* Results */
    .score-hero { text-align: center; padding: 2rem 0; }
    .score-big { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .score-blue { color: #3b82f6; }
    .score-gold { color: #D4A847; }
    .score-label { font-size: 0.8rem; color: #a1a1aa; margin-top: 0.25rem; }
    .scores-row { display: flex; justify-content: center; gap: 3rem; margin-bottom: 2rem; }

    /* Domain bars */
    .domain-bar-row { margin-bottom: 1rem; }
    .domain-bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.375rem; }
    .domain-bar-name { font-weight: 600; color: #d4d4d8; }
    .domain-bar-values { color: #a1a1aa; }
    .bar-pair { display: flex; gap: 0.375rem; }
    .bar-track { flex: 1; height: 20px; background: #27272a; border-radius: 0.25rem; overflow: hidden; }
    .bar-fill-give { height: 100%; background: linear-gradient(90deg, #3b82f6, #2563eb); border-radius: 0.25rem; transition: width 0.6s ease; }
    .bar-fill-receive { height: 100%; background: linear-gradient(90deg, #D4A847, #b8942e); border-radius: 0.25rem; transition: width 0.6s ease; }
    .bar-legend { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 1.5rem; font-size: 0.8rem; }
    .legend-item { display: flex; align-items: center; gap: 0.375rem; color: #a1a1aa; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .legend-give { background: #3b82f6; }
    .legend-receive { background: #D4A847; }

    /* RBI */
    .rbi-card { background: linear-gradient(135deg, #1e3a5f 0%, #18181b 100%); border: 1px solid #3b82f6; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
    .rbi-card h3 { color: #3b82f6; margin-bottom: 0.5rem; }
    .rbi-score { font-size: 2.5rem; font-weight: 900; color: #3b82f6; }
    .rbi-desc { font-size: 0.85rem; color: #a1a1aa; margin-top: 0.5rem; }

    .stat-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #27272a; font-size: 0.875rem; }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #a1a1aa; }
    .stat-value { font-weight: 600; }

    .footer { text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #27272a; font-size: 0.75rem; color: #71717a; }

    @media (max-width: 480px) {
      .container { padding: 1.5rem; }
      h1 { font-size: 1.5rem; }
      .scores-row { gap: 2rem; }
      .score-big { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loadingView">Loading...</div>

  <div class="container hidden" id="mainView">
    <div class="brand">THE VALUE ENGINE</div>
    <h1>Relationship Contribution Matrix</h1>
    <p class="subtitle">20 questions across 5 domains. Score what you give and what you receive.</p>

    <!-- Assessment View -->
    <div id="assessmentView">
      <div class="progress-bar" id="progressBar">
        <div class="progress-segment active"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
      </div>

      <div id="domainContainer"></div>

      <div style="display:flex;gap:0.75rem;margin-top:1rem;">
        <button class="btn-outline" id="prevBtn" onclick="prevDomain()" style="display:none;">Back</button>
        <button class="btn" id="nextBtn" onclick="nextDomain()">Next</button>
      </div>
      <div id="assessError" class="error hidden"></div>
    </div>

    <!-- Results View -->
    <div id="resultsView" class="hidden">
      <div class="scores-row">
        <div style="text-align:center;">
          <div class="score-big score-blue" id="giveScore">0</div>
          <div class="score-label">Contribution Score</div>
        </div>
        <div style="text-align:center;">
          <div class="score-big score-gold" id="receiveScore">0</div>
          <div class="score-label">Receipt Score</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Domain Breakdown</div>
        <div class="bar-legend">
          <div class="legend-item"><div class="legend-dot legend-give"></div> What I Give</div>
          <div class="legend-item"><div class="legend-dot legend-receive"></div> What I Receive</div>
        </div>
        <div id="domainBars"></div>
      </div>

      <div id="rbiSection" class="hidden"></div>

      <div class="card" id="gapCard">
        <div class="section-title">Domain Gaps</div>
        <div id="gapRows"></div>
      </div>

      <a href="/relationship-hub" class="btn-outline" style="margin-top:0.5rem;">Back to Hub</a>
    </div>

    <div class="footer">Value to Victory &mdash; Shawn E. Decker</div>
  </div>

  <script>
    var profile = null;
    var currentDomain = 0;
    var scores = {};

    // 20 questions: 4 per domain (2 give + 2 receive), gender-aware
    var QUESTIONS = [
      // Domain 1: Practical Support (4 questions)
      { domain: 'practical', type: 'give', key: 'practicalGive1', name: 'Practical Support',
        male: "How often do you take the lead on chores, repairs, or errands without being asked?",
        female: "How often do you handle daily tasks and household responsibilities so your partner doesn't have to?" },
      { domain: 'practical', type: 'give', key: 'practicalGive2', name: 'Practical Support',
        male: "How often do you step in to handle something your partner is stressed about — before she asks?",
        female: "How often do you anticipate what needs to be done and handle it before it becomes a problem?" },
      { domain: 'practical', type: 'receive', key: 'practicalReceive1', name: 'Practical Support',
        male: "How often does your partner take care of practical things that make your life easier?",
        female: "How often does your partner handle tasks or fix things without you having to ask?" },
      { domain: 'practical', type: 'receive', key: 'practicalReceive2', name: 'Practical Support',
        male: "How supported do you feel in the day-to-day logistics of life together?",
        female: "How much does your partner share the invisible load of keeping things running?" },

      // Domain 2: Mental Load & Emotional Labor (4 questions)
      { domain: 'mentalLoad', type: 'give', key: 'mentalLoadGive1', name: 'Emotional Labor',
        male: "How often do you notice your partner's stress and check in without being prompted?",
        female: "How often do you carry the mental list — remembering dates, appointments, and details for both of you?" },
      { domain: 'mentalLoad', type: 'give', key: 'mentalLoadGive2', name: 'Emotional Labor',
        male: "How often do you initiate conversations about feelings or the state of the relationship?",
        female: "How often are you the one managing the emotional temperature of the relationship?" },
      { domain: 'mentalLoad', type: 'receive', key: 'mentalLoadReceive1', name: 'Emotional Labor',
        male: "How often does your partner check on your emotional state without you having to bring it up?",
        female: "How often does your partner take things off your mental plate without being told?" },
      { domain: 'mentalLoad', type: 'receive', key: 'mentalLoadReceive2', name: 'Emotional Labor',
        male: "How emotionally safe do you feel being honest about what you're going through?",
        female: "How often does your partner notice when you're overwhelmed and step up?" },

      // Domain 3: Financial (4 questions)
      { domain: 'financial', type: 'give', key: 'financialGive1', name: 'Financial Stewardship',
        male: "How much do you actively carry or share the financial weight for the two of you?",
        female: "How much do you actively contribute to or manage the money side — income, bills, or budgeting?" },
      { domain: 'financial', type: 'give', key: 'financialGive2', name: 'Financial Stewardship',
        male: "How often do you initiate honest conversations about money, debt, or financial goals?",
        female: "How often do you bring up financial planning, savings, or spending habits?" },
      { domain: 'financial', type: 'receive', key: 'financialReceive1', name: 'Financial Stewardship',
        male: "How much does your partner contribute to financial stability or planning?",
        female: "How much financial security or planning does your partner provide?" },
      { domain: 'financial', type: 'receive', key: 'financialReceive2', name: 'Financial Stewardship',
        male: "How aligned do you feel about how money is managed in the relationship?",
        female: "How transparent and honest is your partner about finances?" },

      // Domain 4: Relational Maintenance (4 questions)
      { domain: 'relational', type: 'give', key: 'relationalGive1', name: 'Relational Investment',
        male: "How often do you plan time together, apologize first, or intentionally invest in the relationship?",
        female: "How often do you initiate quality time, emotional talks, or work to repair things between you?" },
      { domain: 'relational', type: 'give', key: 'relationalGive2', name: 'Relational Investment',
        male: "How often do you express appreciation or affirmation — not just when prompted?",
        female: "How often do you verbally affirm, thank, or encourage your partner?" },
      { domain: 'relational', type: 'receive', key: 'relationalReceive1', name: 'Relational Investment',
        male: "How often does your partner show appreciation or initiate connection?",
        female: "How often does your partner plan something, apologize, or invest in you?" },
      { domain: 'relational', type: 'receive', key: 'relationalReceive2', name: 'Relational Investment',
        male: "How valued and respected do you feel in the relationship on a daily basis?",
        female: "How prioritized do you feel compared to your partner's other commitments?" },

      // Domain 5: Growth & Sacrifice (4 questions)
      { domain: 'growth', type: 'give', key: 'growthGive1', name: 'Growth & Sacrifice',
        male: "How often do you adjust your schedule, comfort zone, or lifestyle to support your partner's goals?",
        female: "How often do you put your own needs, time, or comfort on hold to support your partner?" },
      { domain: 'growth', type: 'give', key: 'growthGive2', name: 'Growth & Sacrifice',
        male: "How willing are you to change a habit or pattern when your partner says it matters?",
        female: "How often do you challenge yourself to grow in an area your partner has identified?" },
      { domain: 'growth', type: 'receive', key: 'growthReceive1', name: 'Growth & Sacrifice',
        male: "How often does your partner make sacrifices for your goals or well-being?",
        female: "How often does your partner adjust their life to support your growth?" },
      { domain: 'growth', type: 'receive', key: 'growthReceive2', name: 'Growth & Sacrifice',
        male: "How much does your partner actively invest in their own personal growth?",
        female: "How committed is your partner to becoming better — for themselves and for you?" }
    ];

    // Legacy DOMAINS array for API compatibility (aggregated from 20 questions)
    var DOMAINS = [
      { key: 'practical', name: 'Practical Support & Household Labor' },
      { key: 'mentalLoad', name: 'Mental Load & Emotional Labor' },
      { key: 'financial', name: 'Financial Contribution & Stress Buffering' },
      { key: 'relational', name: 'Relational Maintenance & Appreciation' },
      { key: 'growth', name: 'Growth, Sacrifice & Flexibility' }
    ];

    async function init() {
      var email = '';
      try { email = localStorage.getItem('ve_email') || ''; } catch(e) {}
      if (!email) { window.location.href = '/onboarding'; return; }

      try {
        var resp = await fetch('/api/r/profile?email=' + encodeURIComponent(email));
        if (!resp.ok) { window.location.href = '/onboarding'; return; }
        var data = await resp.json();
        profile = data.profile;

        // Ensure gender and contact_id exist — redirect to onboarding if missing
        if (!profile.contact_id) { window.location.href = '/onboarding'; return; }
        if (!profile.gender) { profile.gender = 'male'; } // default if not set

        // Init scores for all 20 questions
        QUESTIONS.forEach(function(q) {
          scores[q.key] = 5;
        });

        renderQuestion(0);
        document.getElementById('loadingView').classList.add('hidden');
        document.getElementById('mainView').classList.remove('hidden');
      } catch(e) {
        window.location.href = '/onboarding';
      }
    }

    function renderQuestion(idx) {
      var q = QUESTIONS[idx];
      var gender = profile.gender || 'male';
      var question = gender === 'female' ? q.female : q.male;
      var typeLabel = q.type === 'give' ? 'What I Give' : 'What I Receive';

      var html = '<div class="step-counter">Question ' + (idx + 1) + ' of 20</div>';
      html += '<div class="domain-title">' + q.name + '</div>';
      html += '<div style="font-size:.7rem;color:' + (q.type === 'give' ? '#D4A847' : '#3b82f6') + ';text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:.5rem">' + typeLabel + '</div>';
      html += '<div class="domain-question">' + question + '</div>';

      html += '<div class="slider-group">';
      html += '<div class="slider-label"><span class="slider-label-text">' + typeLabel + '</span><span class="slider-value" id="scoreVal">' + scores[q.key] + '</span></div>';
      html += '<input type="range" min="0" max="10" step="1" value="' + scores[q.key] + '" id="scoreSlider" oninput="updateScore()" />';
      html += '<div class="slider-scale"><span>0 — Never</span><span>5 — Sometimes</span><span>10 — Always</span></div>';
      html += '</div>';

      document.getElementById('domainContainer').innerHTML = html;

      // Update progress bar — 5 segments, each covers 4 questions
      var segments = document.querySelectorAll('.progress-segment');
      var domainIdx = Math.floor(idx / 4);
      segments.forEach(function(seg, i) {
        seg.className = 'progress-segment';
        if (i < domainIdx) seg.classList.add('done');
        if (i === domainIdx) seg.classList.add('active');
      });

      // Show/hide buttons
      document.getElementById('prevBtn').style.display = idx === 0 ? 'none' : 'block';
      document.getElementById('nextBtn').textContent = idx === QUESTIONS.length - 1 ? 'Submit' : 'Next';
    }

    function updateScore() {
      var q = QUESTIONS[currentDomain];
      var val = document.getElementById('scoreSlider').value;
      document.getElementById('scoreVal').textContent = val;
      scores[q.key] = parseInt(val);
    }

    function nextDomain() {
      if (currentDomain < QUESTIONS.length - 1) {
        currentDomain++;
        renderQuestion(currentDomain);
      } else {
        submitMatrix();
      }
    }

    function prevDomain() {
      if (currentDomain > 0) {
        currentDomain--;
        renderQuestion(currentDomain);
      }
    }

    async function submitMatrix() {
      var btn = document.getElementById('nextBtn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      // Aggregate 20 individual scores into 5 domain give/receive averages
      function avg(key1, key2) { return Math.round((scores[key1] + scores[key2]) / 2); }

      try {
        var resp = await fetch('/api/r/matrix', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contactId: profile.contact_id,
            gender: profile.gender,
            practicalGive: avg('practicalGive1', 'practicalGive2'),
            practicalReceive: avg('practicalReceive1', 'practicalReceive2'),
            mentalLoadGive: avg('mentalLoadGive1', 'mentalLoadGive2'),
            mentalLoadReceive: avg('mentalLoadReceive1', 'mentalLoadReceive2'),
            financialGive: avg('financialGive1', 'financialGive2'),
            financialReceive: avg('financialReceive1', 'financialReceive2'),
            relationalGive: avg('relationalGive1', 'relationalGive2'),
            relationalReceive: avg('relationalReceive1', 'relationalReceive2'),
            growthGive: avg('growthGive1', 'growthGive2'),
            growthReceive: avg('growthReceive1', 'growthReceive2'),
            detailedScores: scores
          })
        });

        var data = await resp.json();
        if (!resp.ok) {
          var errMsg = data.error === 'contactId and gender are required'
            ? 'Please complete your relationship profile first.'
            : (data.error || 'Submission failed. Please try again.');
          document.getElementById('assessError').textContent = errMsg;
          document.getElementById('assessError').classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Submit';
          return;
        }

        showResults(data);
      } catch(e) {
        document.getElementById('assessError').textContent = 'Something went wrong. Please try again.';
        document.getElementById('assessError').classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    }

    function showResults(data) {
      document.getElementById('assessmentView').classList.add('hidden');
      document.getElementById('resultsView').classList.remove('hidden');

      var m = data.matrix;
      document.getElementById('giveScore').textContent = m.give_total;
      document.getElementById('receiveScore').textContent = m.receive_total;

      // Domain bars
      var domains = [
        { name: 'Practical Support', give: m.practical_give, receive: m.practical_receive },
        { name: 'Mental Load', give: m.mental_load_give, receive: m.mental_load_receive },
        { name: 'Financial', give: m.financial_give, receive: m.financial_receive },
        { name: 'Relational', give: m.relational_give, receive: m.relational_receive },
        { name: 'Growth', give: m.growth_give, receive: m.growth_receive }
      ];

      var barsHtml = '';
      var gapHtml = '';
      domains.forEach(function(d) {
        var giveW = (d.give / 10 * 100);
        var recW = (d.receive / 10 * 100);
        var gap = Math.abs(d.give - d.receive);

        barsHtml += '<div class="domain-bar-row">';
        barsHtml += '<div class="domain-bar-label"><span class="domain-bar-name">' + d.name + '</span><span class="domain-bar-values">' + d.give + ' / ' + d.receive + '</span></div>';
        barsHtml += '<div class="bar-pair">';
        barsHtml += '<div class="bar-track"><div class="bar-fill-give" style="width:' + giveW + '%"></div></div>';
        barsHtml += '<div class="bar-track"><div class="bar-fill-receive" style="width:' + recW + '%"></div></div>';
        barsHtml += '</div></div>';

        gapHtml += '<div class="stat-row"><span class="stat-label">' + d.name + '</span><span class="stat-value" style="color:' + (gap > 3 ? '#ef4444' : gap > 1 ? '#f97316' : '#22c55e') + ';">' + gap + '</span></div>';
      });

      document.getElementById('domainBars').innerHTML = barsHtml;
      document.getElementById('gapRows').innerHTML = gapHtml;

      // RBI if available
      if (data.rbi !== undefined && data.rbi !== null) {
        var rbiHtml = '<div class="rbi-card">';
        rbiHtml += '<h3>Relationship Balance Index</h3>';
        rbiHtml += '<div class="rbi-score">' + data.rbi.toFixed(1) + '</div>';
        rbiHtml += '<div class="rbi-desc">Average domain gap across both partners. Lower is more balanced.</div>';
        rbiHtml += '</div>';
        document.getElementById('rbiSection').innerHTML = rbiHtml;
        document.getElementById('rbiSection').classList.remove('hidden');
      }
    }

    init();
  </script>
</body>
</html>
