  <text x="400" y="24" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#71717a" text-anchor="middle">01_real_estate_pros.md  ·  VTV Skill Pack Bundle  ·  10 packs</text>

  <!-- Left sidebar (file list) -->
