  <!-- File entries -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
    <rect x="0" y="74" width="200" height="22" fill="#1f1f24"/>
    <text x="20" y="89" fill="#D4A847">📄 01_real_estate_pros.md</text>
